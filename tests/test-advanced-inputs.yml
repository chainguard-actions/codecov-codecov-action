name: Test advanced inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: fake-token-for-testing
          dry_run: 'true'
          skip_validation: 'true'
          handle_no_reports_found: 'true'
          disable_search: 'true'
          fail_ci_if_error: 'false'
          network_filter: src/
          network_prefix: /home/runner/work/
          root_dir: .
          gcov_args: '--branch-probabilities'
          gcov_ignore: 'tests/'
          gcov_include: 'src/'
          plugins: noop
          env_vars: 'OS,PYTHON'
          exclude: 'vendor,node_modules'
          commit_parent: 'bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb'
          job_code: 'job-001'
          swift_project: MySwiftProject
          base_sha: 'cccccccccccccccccccccccccccccccccccccccc'
          codecov_yml_path: '.codecov.yml'
          binary: ''
          force: 'false'
      - name: Assert action completed
        run: |
          echo "Advanced inputs test completed successfully"
          echo "PASS"
