name: Test advanced inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a fake codecov yml and fake binary
        run: |
          mkdir -p /tmp/codecov-config
          echo 'coverage:' > /tmp/codecov-config/codecov.yml
          # Create a fake binary that just exits 0 for dry-run testing
          printf '#!/bin/bash\nexit 0\n' > /tmp/fake-codecov
          chmod +x /tmp/fake-codecov
      - id: action
        uses: .
        with:
          token: fake-token-for-testing
          dry_run: 'true'
          handle_no_reports_found: 'true'
          disable_search: 'true'
          skip_validation: 'true'
          binary: '/tmp/fake-codecov'
          base_sha: 'bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb'
          codecov_yml_path: '/tmp/codecov-config/codecov.yml'
          commit_parent: 'cccccccccccccccccccccccccccccccccccccccc'
          force: 'false'
          job_code: 'my-job-code'
          os: 'linux'
          swift_project: 'MySwiftProject'
      - name: Assert action completed
        run: |
          echo "Action completed with advanced inputs"
          echo "PASS"
