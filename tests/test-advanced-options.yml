name: Test advanced options
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a fake codecov yml
        run: |
          echo 'coverage:' > codecov.yml
      - id: action
        uses: .
        with:
          token: fake-token-for-testing
          dry_run: 'true'
          handle_no_reports_found: 'true'
          disable_search: 'true'
          base_sha: 'bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb'
          codecov_yml_path: codecov.yml
          commit_parent: 'cccccccccccccccccccccccccccccccccccccccc'
          gcov_args: '--branch-probabilities'
          gcov_ignore: 'tests/*'
          gcov_include: 'src/*'
          job_code: myjob
          os: linux
          swift_project: MySwiftProject
          force: 'false'
      - name: Assert action completed
        run: |
          echo "Action completed successfully with advanced options"
          echo "PASS"
