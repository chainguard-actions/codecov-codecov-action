---
name: Test advanced options
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create dummy files
        run: |
          echo '<?xml version="1.0" ?><coverage></coverage>' > /tmp/coverage.xml
          echo '' > /tmp/codecov.yml
          # Download a real codecov CLI binary to use as the binary input
          # We use skip_validation=true so integrity check is bypassed
          curl -Os https://uploader.codecov.io/latest/linux/codecov || true
          chmod +x codecov 2>/dev/null || true
      - id: action
        uses: .
        with:
          token: fake-token-for-dry-run
          dry_run: 'true'
          handle_no_reports_found: 'true'
          disable_telem: 'true'
          files: /tmp/coverage.xml
          gcov_args: '--no-output'
          gcov_ignore: /tmp/ignore
          gcov_include: /tmp/include
          os: linux
          swift_project: MyProject
          codecov_yml_path: /tmp/codecov.yml
          recurse_submodules: 'false'
          force: 'false'
          use_legacy_upload_endpoint: 'false'
          use_pypi: 'false'
          run_command: upload-coverage
      - name: Assert action completed
        run: |
          echo "Advanced options test completed successfully"
          echo "PASS"
