name: Test basic dry-run usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dry_run: 'true'
          handle_no_reports_found: 'true'
          skip_validation: 'true'
          token: 'fake-token-for-dry-run'
          flags: 'unit'
          name: 'test-upload'
          files: 'coverage.xml'
          directory: '.'
          exclude: 'vendor'
          disable_search: 'true'
          disable_file_fixes: 'false'
          disable_telem: 'true'
          env_vars: 'OS,PYTHON'
          verbose: 'true'
          version: 'latest'
      - name: Assert action completed
        run: |
          echo "Action completed successfully in dry-run mode"
          echo "PASS"
