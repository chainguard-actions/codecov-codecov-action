---
name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a dummy coverage file
        run: |
          mkdir -p /tmp/coverage
          echo '<?xml version="1.0" ?><coverage></coverage>' > /tmp/coverage/coverage.xml
      - id: action
        uses: .
        with:
          token: fake-token-for-dry-run
          dry_run: 'true'
          handle_no_reports_found: 'true'
          files: /tmp/coverage/coverage.xml
          flags: unit
          name: my-upload
          directory: /tmp/coverage
          disable_search: 'false'
          fail_ci_if_error: 'false'
          verbose: 'false'
          version: latest
          disable_file_fixes: 'false'
          disable_telem: 'true'
          env_vars: GITHUB_REF
          exclude: /tmp/exclude
          plugins: noop
          working-directory: /tmp
      - name: Assert action completed
        run: |
          echo "Action completed successfully in dry_run mode"
          echo "PASS"
