name: Test override inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: fake-token-for-testing
          dry_run: 'true'
          handle_no_reports_found: 'true'
          disable_search: 'true'
          override_branch: main
          override_build: '42'
          override_build_url: 'https://example.com/build/42'
          override_commit: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'
          override_pr: '123'
          slug: myorg/myrepo
          url: 'https://codecov.io'
      - name: Assert action completed
        run: |
          echo "Action completed successfully with override inputs"
          echo "PASS"
