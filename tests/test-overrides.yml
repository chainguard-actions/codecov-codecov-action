name: Test override inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dry_run: 'true'
          handle_no_reports_found: 'true'
          skip_validation: 'true'
          token: 'fake-token-for-dry-run'
          override_branch: 'main'
          override_build: '42'
          override_build_url: 'https://example.com/build/42'
          override_commit: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'
          override_pr: '123'
          slug: 'owner/repo'
          url: 'https://codecov.io'
          report_code: 'default'
          report_type: 'coverage'
          job_code: 'test-job'
          plugins: 'noop'
          root_dir: '.'
          network_filter: 'src/'
          network_prefix: 'prefix/'
          os: 'linux'
          working-directory: '.'
      - name: Assert action completed
        run: |
          echo "Action completed successfully with override inputs"
          echo "PASS"
