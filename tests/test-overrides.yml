---
name: Test override inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a dummy coverage file
        run: |
          echo '<?xml version="1.0" ?><coverage></coverage>' > /tmp/coverage.xml
      - id: action
        uses: .
        with:
          token: fake-token-for-dry-run
          dry_run: 'true'
          handle_no_reports_found: 'true'
          disable_telem: 'true'
          files: /tmp/coverage.xml
          override_branch: main
          override_build: '42'
          override_build_url: https://example.com/build/42
          override_commit: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          override_pr: '123'
          slug: myorg/myrepo
          url: https://codecov.io
          report_code: default
          report_type: coverage
          job_code: job-001
          network_filter: src/
          network_prefix: /home/runner/work/
          root_dir: /tmp
          commit_parent: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          base_sha: cccccccccccccccccccccccccccccccccccccccc
      - name: Assert action completed
        run: |
          echo "Override inputs test completed successfully"
          echo "PASS"
